<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ block "title" . }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  {{ block "head" . }}{{ end }}
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <h1 class="site-title">
        <a href="{{ "" | relLangURL }}">{{ .Site.Title }}</a>
      </h1>
      <nav aria-label="メインナビゲーション">
        <ul class="site-nav">
          <li><a href="{{ "" | relLangURL }}"{{ if .IsHome }} aria-current="page"{{ end }}>ホーム</a></li>
          <li><a href="{{ "about-fivescup/" | relLangURL }}"{{ if in .RelPermalink "/about-fivescup/" }} aria-current="page"{{ end }}>FIVESCUPとは？</a></li>
          <li><a href="{{ "rules/" | relLangURL }}"{{ if in .RelPermalink "/rules/" }} aria-current="page"{{ end }}>大会共通ルール</a></li>
          <li><a href="{{ "posts/" | relLangURL }}"{{ if eq .Section "posts" }} aria-current="page"{{ end }}>投稿一覧</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main class="main">
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="site-footer">
    <div class="site-footer__inner">
      <p>{{ .Site.Title }}</p>
    </div>
  </footer>
</body>
</html>
